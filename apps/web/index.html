<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DBML View</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/style.css" />
    <script>
      // Set initial theme and font before paint to avoid FOUC.
      (() => {
        let stored;
        let theme;
        let font;
        try {
          stored = localStorage.getItem('dbml-view:theme');
          theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch {
          document.documentElement.setAttribute('data-theme', 'light');
        }
        try {
          font = localStorage.getItem('dbml-view:font');
          if (font === 'proportional') {
            document.documentElement.setAttribute('data-font', 'proportional');
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="file-group">
        <button type="button" id="file-button" class="file-button" title="Open .dbml file">
          <svg
            class="file-button-icon"
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M2.5 6A1.5 1.5 0 0 1 4 4.5h3.172a1.5 1.5 0 0 1 1.06.44l1.06 1.06a1.5 1.5 0 0 0 1.06.44H16A1.5 1.5 0 0 1 17.5 8v6A1.5 1.5 0 0 1 16 15.5H4A1.5 1.5 0 0 1 2.5 14V6Z"
            />
          </svg>
          <span class="file-button-label" id="file-button-label">Open</span>
        </button>
        <button
          type="button"
          id="file-dropdown-trigger"
          class="file-dropdown-trigger"
          aria-label="Load sample"
          aria-expanded="false"
          aria-haspopup="menu"
        >
          <svg
            class="file-dropdown-chevron"
            viewBox="0 0 12 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2 4l4 4 4-4" />
          </svg>
        </button>
        <div id="file-dropdown" class="file-dropdown" role="menu" hidden></div>
      </div>
      <nav class="view-toggles" id="view-toggles" role="group">
        <button type="button" data-view="structure" class="is-active" aria-pressed="true">
          <svg
            class="view-toggle-icon"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2.5 3.5h3M2.5 8h3M2.5 12.5h3" />
            <path d="M7.5 3.5h6M7.5 8h6M7.5 12.5h6" />
          </svg>
          <span class="view-toggle-label" data-label></span>
        </button>
        <button type="button" data-view="detail" class="is-active" aria-pressed="true">
          <svg
            class="view-toggle-icon"
            data-icon="table"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="3" width="12" height="10" rx="1" />
            <path d="M2 6.5h12M2 10h12M6 6.5V13M10 6.5V13" />
          </svg>
          <svg
            class="view-toggle-icon"
            data-icon="enum"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            hidden
          >
            <path d="M5 3.5C4 3.5 3.5 4 3.5 5v6c0 1 .5 1.5 1.5 1.5" />
            <path d="M11 3.5c1 0 1.5.5 1.5 1.5v6c0 1-.5 1.5-1.5 1.5" />
            <path d="M6.5 6.5h3M6.5 9.5h3" />
          </svg>
          <span class="view-toggle-label" data-label></span>
        </button>
        <button type="button" data-view="diagram" aria-pressed="false">
          <svg
            class="view-toggle-icon"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="4" cy="4" r="1.5" />
            <circle cx="12" cy="4" r="1.5" />
            <circle cx="8" cy="12" r="1.5" />
            <path d="M5.1 5.1 7 11M10.9 5.1 9 11M5.5 4h5" />
          </svg>
          <span class="view-toggle-label" data-label></span>
        </button>
      </nav>
      <div class="app-header-actions">
        <span id="status" class="status"></span>
      </div>
      <div class="settings-group" id="settings-group">
        <button
          type="button"
          id="settings-trigger"
          class="settings-trigger"
          title="Settings"
          aria-label="Settings"
          aria-expanded="false"
          aria-haspopup="menu"
        >
          <svg
            class="settings-trigger-icon"
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <path d="M3 5.5h14M3 10h14M3 14.5h14" />
            <circle cx="8" cy="5.5" r="2" fill="currentColor" stroke="none" />
            <circle cx="12" cy="10" r="2" fill="currentColor" stroke="none" />
            <circle cx="8" cy="14.5" r="2" fill="currentColor" stroke="none" />
          </svg>
        </button>
        <div id="settings-dropdown" class="settings-dropdown" role="menu" hidden>
          <div class="settings-toggle" role="group" id="theme-toggle" aria-label="Theme">
            <button
              type="button"
              id="theme-light"
              class="settings-toggle-btn"
              data-theme="light"
              aria-pressed="false"
            >
              <svg
                class="settings-toggle-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="8" cy="8" r="3" />
                <path
                  d="M8 1.5v1.8M8 12.7v1.8M1.5 8h1.8M12.7 8h1.8M3.4 3.4l1.3 1.3M11.3 11.3l1.3 1.3M3.4 12.6l1.3-1.3M11.3 4.7l1.3-1.3"
                />
              </svg>
              <span id="theme-light-label">Light</span>
            </button>
            <button
              type="button"
              id="theme-dark"
              class="settings-toggle-btn"
              data-theme="dark"
              aria-pressed="false"
            >
              <svg
                class="settings-toggle-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M13.5 9.7A5.5 5.5 0 1 1 6.3 2.5 4.5 4.5 0 0 0 13.5 9.7Z"
                />
              </svg>
              <span id="theme-dark-label">Dark</span>
            </button>
          </div>
          <div class="settings-toggle" role="group" id="font-toggle" aria-label="Font">
            <button
              type="button"
              id="font-mono"
              class="settings-toggle-btn"
              data-font="mono"
              aria-pressed="false"
            >
              <svg
                class="settings-toggle-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M5.5 4.5 2 8l3.5 3.5M10.5 4.5 14 8l-3.5 3.5" />
              </svg>
              <span id="font-mono-label">Mono</span>
            </button>
            <button
              type="button"
              id="font-proportional"
              class="settings-toggle-btn"
              data-font="proportional"
              aria-pressed="false"
            >
              <svg
                class="settings-toggle-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M3 13 8 3l5 10M5.2 9.5h5.6" />
              </svg>
              <span id="font-proportional-label">Sans</span>
            </button>
          </div>
          <select id="lang-select" class="settings-select" aria-label="Language">
            <option value="en">English</option>
            <option value="cs">Čeština</option>
          </select>
          <div class="settings-footer">
            <span id="settings-version" class="settings-version" aria-label="Version"></span>
            <a
              id="settings-github"
              class="settings-github"
              href="https://github.com/adawolfa/dbml-view"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg
                class="settings-github-icon"
                viewBox="0 0 16 16"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M8 .2a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.39v-1.38c-2.23.48-2.7-1.07-2.7-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.05-.49.05-.49.8.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.5-1.08-1.78-.2-3.65-.89-3.65-3.97 0-.88.31-1.59.83-2.15-.08-.2-.36-1.02.08-2.13 0 0 .67-.22 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.93.08 2.13.52.56.83 1.27.83 2.15 0 3.09-1.88 3.76-3.67 3.96.29.25.54.74.54 1.5v2.22c0 .22.15.47.55.39A8 8 0 0 0 8 .2Z"
                />
              </svg>
              <span id="settings-github-label">GitHub</span>
            </a>
          </div>
        </div>
      </div>
      <input type="file" id="file-input" accept=".dbml,text/plain" hidden />
    </header>
    <main id="app">
      <div class="dropzone" id="dropzone">
        <p>Drop a <code>.dbml</code> file here or click to browse.</p>
        <p class="dropzone-hint">Or load a sample from the header.</p>
      </div>
      <div class="views" id="views" hidden>
        <section id="view-structure" class="view view-structure">
          <dbml-structure id="structure"></dbml-structure>
        </section>
        <section id="view-detail" class="view view-detail">
          <dbml-detail id="detail"></dbml-detail>
        </section>
        <section id="view-diagram" class="view view-diagram">
          <dbml-diagram id="diagram"></dbml-diagram>
        </section>
      </div>
    </main>
    <dialog id="error-modal" class="error-modal" aria-modal="true" aria-labelledby="error-modal-title">
      <div class="error-modal-header">
        <h2 id="error-modal-title" class="error-modal-title"></h2>
        <button type="button" id="error-modal-close" class="error-modal-close">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" aria-hidden="true">
            <path d="M3 3l10 10M13 3L3 13" />
          </svg>
        </button>
      </div>
      <div id="error-modal-body" class="error-modal-body"></div>
    </dialog>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
