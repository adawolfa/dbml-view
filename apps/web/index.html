<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dbml-view</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>dbml-view</h1>
      <nav class="tabs" id="tabs">
        <button type="button" data-tab="structure" class="is-active">Structure</button>
        <button type="button" data-tab="diagram">Diagram</button>
        <button type="button" data-tab="split">Split</button>
      </nav>
      <div class="app-header-actions">
        <span id="status" class="status"></span>
        <div class="sample-picker">
          <span class="sample-label">Samples:</span>
          <button type="button" data-sample="small.dbml">small</button>
          <button type="button" data-sample="medium.dbml">medium</button>
          <button type="button" data-sample="edge-cases.dbml">edge-cases</button>
        </div>
        <button type="button" id="open-button">Open .dbml…</button>
        <input type="file" id="file-input" accept=".dbml,text/plain" hidden />
      </div>
    </header>
    <main id="app">
      <div class="dropzone" id="dropzone">
        <p>Drop a <code>.dbml</code> file here or click <strong>Open .dbml…</strong>.</p>
        <p class="dropzone-hint">Or load a sample from the header.</p>
      </div>
      <section id="view-structure" class="view view-single" hidden>
        <dbml-structure id="structure"></dbml-structure>
      </section>
      <section id="view-diagram" class="view view-single" hidden>
        <dbml-diagram id="diagram"></dbml-diagram>
      </section>
      <section id="view-split" class="view view-split" hidden>
        <dbml-structure id="structure-split"></dbml-structure>
        <dbml-diagram id="diagram-split"></dbml-diagram>
      </section>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
