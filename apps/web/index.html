<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dbml-view</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script>
      // Set initial theme before paint to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem('dbml-view:theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <button type="button" id="file-button" class="file-button" title="Open .dbml file">
        <svg
          class="file-button-icon"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M2.5 6A1.5 1.5 0 0 1 4 4.5h3.172a1.5 1.5 0 0 1 1.06.44l1.06 1.06a1.5 1.5 0 0 0 1.06.44H16A1.5 1.5 0 0 1 17.5 8v6A1.5 1.5 0 0 1 16 15.5H4A1.5 1.5 0 0 1 2.5 14V6Z"
          />
        </svg>
        <span class="file-button-label" id="file-button-label">Open</span>
      </button>
      <nav class="view-toggles" id="view-toggles">
        <button type="button" data-view="structure" class="is-active" aria-pressed="true">
          Structure
        </button>
        <button type="button" data-view="detail" class="is-active" aria-pressed="true">
          Detail
        </button>
        <button type="button" data-view="diagram" aria-pressed="false">Diagram</button>
      </nav>
      <div class="app-header-actions">
        <div class="sample-picker">
          <span class="sample-label">Samples:</span>
          <button type="button" data-sample="small.dbml">small</button>
          <button type="button" data-sample="medium.dbml">medium</button>
          <button type="button" data-sample="edge-cases.dbml">edge-cases</button>
        </div>
        <span id="status" class="status"></span>
      </div>
      <button
        type="button"
        id="theme-toggle"
        class="theme-toggle"
        title="Toggle theme"
        aria-label="Toggle theme"
      >
        <svg
          class="theme-toggle-icon theme-toggle-icon-moon"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M16.5 11.8A6.5 6.5 0 0 1 8.2 3.5a6.5 6.5 0 1 0 8.3 8.3Z" />
        </svg>
        <svg
          class="theme-toggle-icon theme-toggle-icon-sun"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="10" cy="10" r="3.25" />
          <path
            d="M10 2.25v1.5M10 16.25v1.5M2.25 10h1.5M16.25 10h1.5M4.5 4.5l1.06 1.06M14.44 14.44l1.06 1.06M4.5 15.5l1.06-1.06M14.44 5.56l1.06-1.06"
          />
        </svg>
      </button>
      <input type="file" id="file-input" accept=".dbml,text/plain" hidden />
    </header>
    <main id="app">
      <div class="dropzone" id="dropzone">
        <p>Drop a <code>.dbml</code> file here or click to browse.</p>
        <p class="dropzone-hint">Or load a sample from the header.</p>
      </div>
      <div class="views" id="views" hidden>
        <section id="view-structure" class="view view-structure">
          <dbml-structure id="structure"></dbml-structure>
        </section>
        <section id="view-detail" class="view view-detail">
          <dbml-detail id="detail"></dbml-detail>
        </section>
        <section id="view-diagram" class="view view-diagram">
          <dbml-diagram id="diagram"></dbml-diagram>
        </section>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
