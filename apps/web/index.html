<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dbml-view</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script>
      // Set initial theme and font before paint to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem('dbml-view:theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
        try {
          var font = localStorage.getItem('dbml-view:font');
          if (font === 'proportional') {
            document.documentElement.setAttribute('data-font', 'proportional');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="file-group">
        <button type="button" id="file-button" class="file-button" title="Open .dbml file">
          <svg
            class="file-button-icon"
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M2.5 6A1.5 1.5 0 0 1 4 4.5h3.172a1.5 1.5 0 0 1 1.06.44l1.06 1.06a1.5 1.5 0 0 0 1.06.44H16A1.5 1.5 0 0 1 17.5 8v6A1.5 1.5 0 0 1 16 15.5H4A1.5 1.5 0 0 1 2.5 14V6Z"
            />
          </svg>
          <span class="file-button-label" id="file-button-label">Open</span>
        </button>
        <button
          type="button"
          id="file-dropdown-trigger"
          class="file-dropdown-trigger"
          aria-label="Load sample"
          aria-expanded="false"
          aria-haspopup="menu"
        >
          <svg
            class="file-dropdown-chevron"
            viewBox="0 0 12 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2 4l4 4 4-4" />
          </svg>
        </button>
        <div id="file-dropdown" class="file-dropdown" role="menu" hidden></div>
      </div>
      <nav class="view-toggles" id="view-toggles">
        <button type="button" data-view="structure" class="is-active" aria-pressed="true">
          Structure
        </button>
        <button type="button" data-view="detail" class="is-active" aria-pressed="true">
          Detail
        </button>
        <button type="button" data-view="diagram" aria-pressed="false">Diagram</button>
      </nav>
      <div class="app-header-actions">
        <span id="status" class="status"></span>
      </div>
      <div class="settings-group" id="settings-group">
        <button
          type="button"
          id="settings-trigger"
          class="settings-trigger"
          title="Settings"
          aria-label="Settings"
          aria-expanded="false"
          aria-haspopup="menu"
        >
          <svg
            class="settings-trigger-icon"
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <path d="M3 5.5h14M3 10h14M3 14.5h14" />
            <circle cx="8" cy="5.5" r="2" fill="currentColor" stroke="none" />
            <circle cx="12" cy="10" r="2" fill="currentColor" stroke="none" />
            <circle cx="8" cy="14.5" r="2" fill="currentColor" stroke="none" />
          </svg>
        </button>
        <div id="settings-dropdown" class="settings-dropdown" role="menu" hidden>
          <label class="settings-label" id="theme-select-label" for="theme-select">Theme</label>
          <select id="theme-select" class="settings-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <label class="settings-label" id="lang-select-label" for="lang-select">Language</label>
          <select id="lang-select" class="settings-select">
            <option value="en">English</option>
            <option value="cs">Čeština</option>
          </select>
          <label class="settings-label" id="font-select-label" for="font-select">Font</label>
          <select id="font-select" class="settings-select">
            <option value="mono">Cascadia Code</option>
            <option value="proportional">Aptos</option>
          </select>
        </div>
      </div>
      <input type="file" id="file-input" accept=".dbml,text/plain" hidden />
    </header>
    <main id="app">
      <div class="dropzone" id="dropzone">
        <p>Drop a <code>.dbml</code> file here or click to browse.</p>
        <p class="dropzone-hint">Or load a sample from the header.</p>
      </div>
      <div class="views" id="views" hidden>
        <section id="view-structure" class="view view-structure">
          <dbml-structure id="structure"></dbml-structure>
        </section>
        <section id="view-detail" class="view view-detail">
          <dbml-detail id="detail"></dbml-detail>
        </section>
        <section id="view-diagram" class="view view-diagram">
          <dbml-diagram id="diagram"></dbml-diagram>
        </section>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
